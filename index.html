<div class="carousel">

  <!-- Left Arrow -->
  <button class="arrow left" onclick="prevVideo()">❮</button>

  <!-- Video Wrappers -->
  <div class="video-wrapper active">
    <video playsinline controls preload="auto">
      <source src="intro.mp4" type="video/mp4">
    </video>
  </div>

  <div class="video-wrapper">
    <video playsinline controls preload="auto">
      <source src="Cabinet.mp4" type="video/mp4">
    </video>
  </div>

  <div class="video-wrapper">
    <video playsinline controls preload="auto">
      <source src="Admiral.mp4" type="video/mp4">
    </video>
  </div>

  <div class="video-wrapper">
    <video playsinline controls preload="auto">
      <source src="EAG2.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Right Arrow -->
  <button class="arrow right" onclick="nextVideo()">❯</button>

</div>

<style>
.carousel {
  position: relative;
  width: 100%;
  height: 90vh;
  background-color: black;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* Each video is wrapped */
.video-wrapper {
  display: none; /* hide all by default */
  width: 100%;
  height: 100%;
  justify-content: center;
  align-items: center;
}

.video-wrapper.active {
  display: flex; /* show only active video */
}

.video-wrapper video {
  max-height: 90vh;
  max-width: 95vw;
  object-fit: contain;
  border: 2px solid #fff;
  border-radius: 8px;
  background-color: black;
}

/* Arrows */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  font-size: 32px;
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 6px;
  z-index: 10; /* ensures arrows are above videos */
}

.arrow:hover {
  background: rgba(0,0,0,0.9);
}

.left { left: -60px; }
.right { right: -60px; }

@media(max-width:900px){
  .left { left: 10px; }
  .right { right: 10px; }
}
</style>

<script>
let current = 0;
const wrappers = document.querySelectorAll(".video-wrapper");

function showVideo(index){
  wrappers[current].classList.remove("active");
  const vid = wrappers[current].querySelector("video");
  vid.pause();
  vid.currentTime = 0;

  current = index;
  if(current >= wrappers.length) current = 0;
  if(current < 0) current = wrappers.length - 1;

  wrappers[current].classList.add("active");
}

function nextVideo(){ showVideo(current + 1); }
function prevVideo(){ showVideo(current - 1); }

/* Auto-advance on video end */
wrappers.forEach((wrapper,i)=>{
  const vid = wrapper.querySelector("video");
  vid.addEventListener("ended", ()=>{
    if(i === current) nextVideo();
  });
});
</script>
