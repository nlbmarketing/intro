<div class="carousel">

  <button class="arrow left" onclick="prevVideo()">❮</button>

  <div class="video-wrapper active">
    <video playsinline controls preload="auto">
      <source src="intro.mp4" type="video/mp4">
    </video>
  </div>

  <div class="video-wrapper">
    <video playsinline controls preload="auto">
      <source src="Cabinet.mp4" type="video/mp4">
    </video>
  </div>

  <div class="video-wrapper">
    <video playsinline controls preload="auto">
      <source src="Admiral.mp4" type="video/mp4">
    </video>
  </div>

  <div class="video-wrapper">
    <video playsinline controls preload="auto">
      <source src="EAG2.mp4" type="video/mp4">
    </video>
  </div>

  <button class="arrow right" onclick="nextVideo()">❯</button>

</div>

<style>
.carousel {
  position: relative;
  width: 100%;
  height: 90vh;
  background-color: black;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.video-wrapper {
  display: none; /* hide all by default */
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.video-wrapper.active {
  display: flex; /* show active video */
}

.video-wrapper video {
  max-height: 90vh;
  max-width: 95vw;
  object-fit: contain;
  border: 2px solid #fff;
  border-radius: 8px;
  background-color: black;
}
</style>

<script>
let current = 0;
const wrappers = document.querySelectorAll(".video-wrapper");

function showVideo(index){
  wrappers[current].classList.remove("active");
  wrappers[current].querySelector("video").pause();
  wrappers[current].querySelector("video").currentTime = 0;

  current = index;
  if(current >= wrappers.length) current = 0;
  if(current < 0) current = wrappers.length - 1;

  wrappers[current].classList.add("active");
}

function nextVideo(){ showVideo(current + 1); }
function prevVideo(){ showVideo(current - 1); }

/* Auto advance */
wrappers.forEach((wrapper,i)=>{
  const vid = wrapper.querySelector("video");
  vid.addEventListener("ended",()=>{
    if(i === current) nextVideo();
  });
});
</script>
