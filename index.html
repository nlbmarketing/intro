<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nathan Branagh</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  color:white;
  background:black;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* Blurred background */
.background-blur{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:url('NAH.png') center/cover no-repeat;
  filter:blur(25px);
  z-index:-1;
}

/* Name */
.name{
  font-size:2rem;
  font-weight:bold;
  margin-top:1rem;
  margin-bottom:2rem;
  text-align:center;
}

/* Links */
.links{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-bottom:2rem;
}

.links a{
  text-decoration:none;
  color:white;
  font-weight:bold;
  font-size:1rem;
}

.links span{
  color:white;
  font-size:1rem;
}

/* Carousel */
.carousel-container{
  width:100%;
  display:flex;
  justify-content:center;
  overflow:hidden;
  padding:20px 0;
  position:relative;
}

.carousel{
  display:flex;
  align-items:center;
  gap:30px;
  scroll-behavior:smooth;
  justify-content:center;
  scroll-snap-type:x mandatory;
}

.carousel video{
  flex:0 0 auto;
  height:65vh;
  border:none;
  border-radius:8px;
  object-fit:contain;
  cursor:pointer;
  transition:all .5s ease;
  background:black;
  scroll-snap-align:center;
}

/* Focused */
.carousel.focused video{
  opacity:.6;
}

.carousel.focused video.active{
  max-height:85vh;
  opacity:1;
  z-index:2;
}

/* Arrows */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,.5);
  border:none;
  color:white;
  font-size:36px;
  padding:12px 16px;
  cursor:pointer;
  border-radius:6px;
  z-index:10;
  display:none;
}

.arrow.left{left:10px;}
.arrow.right{right:10px;}

.arrow:hover{
  background:rgba(0,0,0,.7);
}

/* Desktop */
@media(min-width:901px){
  .carousel-container:hover .arrow{
    display:block;
  }
}

/* Mobile */
@media(max-width:900px){
  .carousel-container{
    overflow-x:auto;
    padding:10px 0;
  }

  .carousel{
    gap:15px;
    justify-content:flex-start;
  }

  .carousel video{
    max-height:80vh;
    flex:0 0 auto;
  }

  .arrow{
    display:block!important;
  }
}

</style>
</head>

<body>

<div class="background-blur"></div>

<div class="name">Nathan Branagh</div>

<div class="links">
  <a href="https://www.linkedin.com/in/nathanbranagh/" target="_blank">LinkedIn</a>
  <span>|</span>
  <a href="https://drive.google.com/drive/folders/1x9_RzVzoP2SZ3xy2s5E-kBiOas8eTh6h" target="_blank">Portfolio</a>
  <span>|</span>
  <a href="https://www.tiktok.com/@retrojthompson?_r=1&_t=ZN-935tpweVK10" target="_blank">TikTok</a>
</div>

<div class="carousel-container">

  <div class="carousel">

    <video id="intro-video" playsinline autoplay muted controls preload="auto" poster="intro.jpg">
      <source src="intro.mp4" type="video/mp4">
    </video>

    <video id="cabinet-video" playsinline autoplay muted controls preload="auto" poster="Cabinet.jpg">
      <source src="Cabinet.mp4" type="video/mp4">
    </video>

    <video id="admiral-video" playsinline autoplay muted controls preload="auto" poster="Admiral.jpg">
      <source src="Admiral.mp4" type="video/mp4">
    </video>

    <video id="eag2-video" playsinline autoplay muted controls preload="auto" poster="EAG2.jpg">
      <source src="EAG2.mp4" type="video/mp4">
    </video>

    <video id="sr2-video" playsinline autoplay muted controls preload="auto" poster="SR2.jpg">
      <source src="SR2.mp4" type="video/mp4">
    </video>

  </div>

  <button class="arrow left" onclick="prevVideo()">❮</button>
  <button class="arrow right" onclick="nextVideo()">❯</button>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

  let current = 0;
  const carousel = document.querySelector(".carousel");
  const videos = carousel.querySelectorAll("video");

  function pauseAllExcept(active){
    videos.forEach(v=>{
      if(v!==active) v.pause();
    });
  }

  /* CLICK TO FOCUS */
  videos.forEach((vid,i)=>{

    vid.addEventListener("click", ()=>{
      pauseAllExcept(vid);
      vid.muted = false;

      if(!carousel.classList.contains("focused")){
        carousel.classList.add("focused");
        current = i;
        updateCarousel();
      }
    });

    /* Hover preview */
    vid.addEventListener("mouseenter", ()=>{
      if(window.innerWidth>900){
        pauseAllExcept(vid);
        vid.currentTime=0;
        vid.play();
      }
    });

    vid.addEventListener("mouseleave", ()=>{
      if(window.innerWidth>900){
        vid.pause();
        vid.currentTime=0;
      }
    });

    vid.addEventListener("play", ()=>pauseAllExcept(vid));
  });

  /* Exit focus */
  function exitFocusedMode(){
    carousel.classList.remove("focused");
    videos.forEach(v=>v.classList.remove("active"));
  }

  carousel.addEventListener("click", e=>{
    if(carousel.classList.contains("focused") && !e.target.classList.contains("active")){
      exitFocusedMode();
    }
  });

  document.addEventListener("keydown", e=>{
    if(e.key==="Escape" && carousel.classList.contains("focused")){
      exitFocusedMode();
    }
  });

  function updateCarousel(){
    videos.forEach((v,i)=>{
      v.classList.remove("active");
      if(i===current) v.classList.add("active");
    });

    if(window.innerWidth>900){
      const activeVideo = videos[current];
      const carouselRect = carousel.getBoundingClientRect();
      const videoRect = activeVideo.getBoundingClientRect();
      const offset = videoRect.left - carouselRect.left - (carouselRect.width/2) + (videoRect.width/2);

      carousel.scrollBy({
        left: offset,
        behavior: "smooth"
      });
    }
  }

  function nextVideo(){
    videos[current].pause();
    current = (current+1) % videos.length;
    updateCarousel();
  }

  function prevVideo(){
    videos[current].pause();
    current = (current-1 + videos.length) % videos.length;
    updateCarousel();
  }

  window.nextVideo = nextVideo;
  window.prevVideo = prevVideo;

  /* Mobile center */
  if(window.innerWidth <= 900){
    videos[0].scrollIntoView({ behavior:"auto", inline:"center" });
  }

  /* Force first frame & Cabinet offset */
  videos.forEach(video=>{
    video.addEventListener("loadedmetadata", ()=>{
      if(video.id === "cabinet-video"){
        video.currentTime = 0.5;
      } else {
        video.currentTime = 0.01;
      }
      video.play().catch(()=>{});
    });
  });

  /* Mobile autoplay fix: start on first touch */
  document.body.addEventListener('touchstart', ()=>{
    videos.forEach(v => v.play().catch(()=>{}));
  }, { once: true });

});

</script>

</body>
</html>
