<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 2rem;
      background-color: black;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
    }
    .links {
      display: flex;
      flex-wrap: wrap; /* allows links to wrap on small screens */
      justify-content: center;
      gap: 5px;
      margin-bottom: 1rem;
    }
    .links a {
      text-decoration: none;
      color: #00ffff;
      font-weight: bold;
      white-space: nowrap; /* prevents breaking individual links */
    }
    .links span {
      color: white;
    }
    video {
      width: 100%; /* video scales with screen width */
      max-width: 600px; /* optional max size */
      height: auto;
      border: 2px solid #fff;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="links">
    <a href="https://www.linkedin.com/in/nathanbranagh/" target="_blank">LinkedIn</a><span>|</span>
    <a href="https://drive.google.com/drive/folders/1x9_RzVzoP2SZ3xy2s5E-kBiOas8eTh6h" target="_blank">Portfolio</a><span>|</span>
    <a href="https://www.tiktok.com/@retrojthompson?_r=1&_t=ZN-935tpweVK10" target="_blank">TikTok</a>
  </div>

  <video controls>
    <source src="your-video.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

</body>
</html>
