<div class="carousel-container">

  <!-- Left Arrow -->
  <button class="arrow left" onclick="scrollLeft()">❮</button>

  <!-- Scrollable Carousel -->
  <div class="carousel">
    <video playsinline controls preload="auto">
      <source src="intro.mp4" type="video/mp4">
    </video>

    <video playsinline controls preload="auto">
      <source src="Cabinet.mp4" type="video/mp4">
    </video>

    <video playsinline controls preload="auto">
      <source src="Admiral.mp4" type="video/mp4">
    </video>

    <video playsinline controls preload="auto">
      <source src="EAG2.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Right Arrow -->
  <button class="arrow right" onclick="scrollRight()">❯</button>

</div>

<style>
body {
  margin: 0;
  padding: 0;
  background-color: black;
  font-family: Arial, sans-serif;
  color: white;
}

.carousel-container {
  position: relative;
  width: 100%;
  height: 90vh;
  background-color: black;
  display: flex;
  align-items: center;
  overflow: hidden;
}

.carousel {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  scroll-behavior: smooth;
  padding: 0 60px; /* space for arrows */
  height: 100%;
}

.carousel::-webkit-scrollbar {
  display: none; /* hide scrollbar */
}

.carousel video {
  flex: 0 0 auto; /* prevent shrinking */
  max-height: 90vh;
  max-width: 400px; /* adjust per your preference */
  border: 2px solid #fff;
  border-radius: 8px;
  object-fit: contain;
  background-color: black;
}

/* Arrows */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  font-size: 32px;
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 6px;
  z-index: 10;
}

.arrow.left { left: 10px; }
.arrow.right { right: 10px; }

.arrow:hover {
  background: rgba(0,0,0,0.9);
}

@media(max-width:900px){
  .carousel video {
    max-width: 70vw;
  }
}
</style>

<script>
const carousel = document.querySelector(".carousel");
const scrollAmount = 400; // amount to scroll per click

function scrollLeft(){
  carousel.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
}

function scrollRight(){
  carousel.scrollBy({ left: scrollAmount, behavior: 'smooth' });
}
</script>
