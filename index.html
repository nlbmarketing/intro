<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nathan Branagh</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: black;
  transition: background 0.5s ease;
}

/* Blurred background */
.background-blur {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('NAH.png') center/cover no-repeat;
  filter: blur(25px);
  z-index: -1;
  transition: opacity 0.5s ease;
  opacity: 1;
}

/* Top links */
.links {
  margin: 2rem 0 1rem 0;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  z-index: 5;
  position: relative;
}

.links a {
  text-decoration: none;
  color: white;
  font-weight: bold;
  font-size: 1rem;
}

.links span {
  color: white;
  font-size: 1rem;
}

/* Carousel container */
.carousel-container {
  width: 100%;
  display: flex;
  justify-content: center;
  overflow: hidden;
  padding-bottom: 20px;
  position: relative;
}

/* Carousel row */
.carousel {
  display: flex;
  align-items: center;
  gap: 30px;
  transition: all 0.5s ease;
  scroll-behavior: smooth;
}

.carousel video {
  flex: 0 0 auto;
  width: auto;
  height: 65vh;
  border: none;
  border-radius: 8px;
  object-fit: contain;
  cursor: pointer;
  transition: all 0.5s ease;
}

/* Focused state */
.carousel.focused video {
  opacity: 0.6;
}

.carousel.focused video.active {
  width: auto;
  max-height: 85vh;
  opacity: 1;
  z-index: 2;
}

/* Arrows */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  font-size: 36px;
  padding: 12px 16px;
  cursor: pointer;
  border-radius: 6px;
  z-index: 10;
  display: none; /* default hidden on desktop */
}

.arrow.left { left: 10px; }
.arrow.right { right: 10px; }

.arrow:hover {
  background: rgba(0,0,0,0.7);
}

/* Show arrows on hover for desktop */
@media(min-width:901px){
  .carousel-container:hover .arrow {
    display: block;
  }
}

/* Mobile responsive */
@media(max-width:900px){
  body {
    align-items: stretch;
  }
  .carousel-container {
    overflow-x: auto;
    padding: 10px 0;
  }
  .carousel {
    gap: 15px;
  }
  .carousel video {
    width: auto;
    max-height: 80vh;
    flex: 0 0 auto;
    border: none;
    preload: auto;
    playsinline: true;
    controls: true; /* ensures tap-to-play on mobile */
  }
  .carousel.focused video.active {
    max-height: 90vh;
    width: auto;
    border: none;
  }
  .arrow {
    display: block !important; /* always visible on mobile */
  }
}
</style>
</head>
<body>

<div class="background-blur"></div>

<div class="links">
  <a href="https://www.linkedin.com/in/nathanbranagh/" target="_blank">
