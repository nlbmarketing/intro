<script>
document.addEventListener("DOMContentLoaded", function() {

  let current = 0;
  let audioUnlocked = false;
  const carousel = document.querySelector(".carousel");
  const videos = carousel.querySelectorAll("video");

  /* Unlock audio after first click */
  document.addEventListener("click", () => { audioUnlocked = true; }, { once: true });

  /* Set initial frame: Cabinet.mp4 at 0.5s, others at 0s */
  videos.forEach(video => {
    video.addEventListener("loadeddata", () => {
      if (video.readyState >= 2) {
        if (video.querySelector("source").src.includes("Cabinet.mp4")) {
          video.currentTime = 0.5;
        } else {
          video.currentTime = 0;
        }
      }
    });
  });

  function pauseAllExcept(active) {
    videos.forEach(v => {
      if (v !== active) v.pause();
    });
  }

  /* Video interactions */
  videos.forEach((vid, i) => {

    vid.addEventListener("click", () => {
      pauseAllExcept(vid);
      if (audioUnlocked) vid.muted = false;
      if (!carousel.classList.contains("focused")) {
        carousel.classList.add("focused");
        current = i;
        updateCarousel();
      }
    });

    /* Hover preview (desktop only) */
    vid.addEventListener("mouseenter", () => {
      if (window.innerWidth > 900) {
        pauseAllExcept(vid);
        if (audioUnlocked) vid.muted = false;
        vid.currentTime = vid.querySelector("source").src.includes("Cabinet.mp4") ? 0.5 : 0;
        vid.play();
      }
    });

    vid.addEventListener("mouseleave", () => {
      if (window.innerWidth > 900) {
        vid.pause();
        vid.currentTime = vid.querySelector("source").src.includes("Cabinet.mp4") ? 0.5 : 0;
      }
    });

    vid.addEventListener("play", () => pauseAllExcept(vid));
  });

  /* Exit focus mode */
  function exitFocusedMode() {
    carousel.classList.remove("focused");
    videos.forEach(v => v.classList.remove("active"));
  }

  carousel.addEventListener("click", e => {
    if (carousel.classList.contains("focused") && !e.target.classList.contains("active")) {
      exitFocusedMode();
    }
  });

  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && carousel.classList.contains("focused")) {
      exitFocusedMode();
    }
  });

  function updateCarousel() {
    videos.forEach((v, i) => {
      v.classList.remove("active");
      if (i === current) v.classList.add("active");
    });
    if (window.innerWidth > 900) {
      const activeVideo = videos[current];
      const carouselRect = carousel.getBoundingClientRect();
      const videoRect = activeVideo.getBoundingClientRect();
      const offset = videoRect.left - carouselRect.left - (carouselRect.width / 2) + (videoRect.width / 2);
      carousel.scrollBy({ left: offset, behavior: "smooth" });
    }
  }

  function nextVideo() {
    videos[current].pause();
    current = (current + 1) % videos.length;
    updateCarousel();
  }

  function prevVideo() {
    videos[current].pause();
    current = (current - 1 + videos.length) % videos.length;
    updateCarousel();
  }

  window.nextVideo = nextVideo;
  window.prevVideo = prevVideo;

  /* Mobile: center first video */
  if (window.innerWidth <= 900) {
    videos[0].scrollIntoView({ behavior: "auto", inline: "center" });
  }

});
</script>
