<div class="carousel-container">

  <button class="arrow left" onclick="prevVideo()">❮</button>

  <div class="carousel">
    <video class="active" playsinline controls preload="auto">
      <source src="intro.mp4" type="video/mp4">
    </video>
    <video playsinline controls preload="auto">
      <source src="Cabinet.mp4" type="video/mp4">
    </video>
    <video playsinline controls preload="auto">
      <source src="Admiral.mp4" type="video/mp4">
    </video>
    <video playsinline controls preload="auto">
      <source src="EAG2.mp4" type="video/mp4">
    </video>
  </div>

  <button class="arrow right" onclick="nextVideo()">❯</button>

</div>

<style>
body {
  margin: 0;
  background-color: black;
  font-family: Arial, sans-serif;
}

.carousel-container {
  position: relative;
  width: 100%;
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.carousel {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  transition: transform 0.5s ease;
}

.carousel video {
  width: 200px;       /* side videos */
  max-height: 70vh;
  border: 2px solid #fff;
  border-radius: 8px;
  object-fit: contain;
  background-color: black;
  transition: all 0.5s ease;
  opacity: 0.5;
}

.carousel video.active {
  width: 400px;       /* center video bigger */
  max-height: 85vh;
  opacity: 1;
  border: 3px solid #00ffff;
}

/* Arrows */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  font-size: 32px;
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 6px;
  z-index: 10;
}

.arrow.left { left: 10px; }
.arrow.right { right: 10px; }

.arrow:hover {
  background: rgba(0,0,0,0.9);
}
</style>

<script>
let current = 0;
const videos = document.querySelectorAll(".carousel video");

function updateCarousel() {
  videos.forEach((vid, i) => {
    vid.classList.remove("active");
    if(i === current) vid.classList.add("active");
  });
}

function nextVideo(){
  current = (current + 1) % videos.length;
  updateCarousel();
}

function prevVideo(){
  current = (current - 1 + videos.length) % videos.length;
  updateCarousel();
}

/* Optional: auto-advance */
videos.forEach((vid, i)=>{
  vid.addEventListener("ended", ()=>{
    if(i === current) nextVideo();
  });
});
</script>
