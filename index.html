<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nathan Branagh Carousel</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background-color: black;
  font-family: Arial, sans-serif;
  color: white;
}

.carousel-container {
  position: relative;
  width: 100%;
  height: 90vh;
  background-color: black;
  overflow: hidden;
}

.video-wrapper {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
}

.video-wrapper.active {
  display: flex;
}

.video-wrapper video {
  max-width: 95vw;
  max-height: 90vh;
  object-fit: contain;
  border: 2px solid #fff;
  border-radius: 8px;
  background-color: black;
}

/* Arrows */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  font-size: 32px;
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 6px;
  z-index: 100; /* above videos */
}

.arrow.left { left: 10px; }
.arrow.right { right: 10px; }

.arrow:hover {
  background: rgba(0,0,0,0.9);
}
</style>
</head>
<body>

<div class="carousel-container">

  <button class="arrow left" onclick="prevVideo()">❮</button>

  <div class="video-wrapper active">
    <video playsinline controls preload="auto">
      <source src="intro.mp4" type="video/mp4">
    </video>
  </div>

  <div class="video-wrapper">
    <video playsinline controls preload="auto">
      <source src="Cabinet.mp4" type="video/mp4">
    </video>
  </div>

  <div class="video-wrapper">
    <video playsinline controls preload="auto">
      <source src="Admiral.mp4" type="video/mp4">
    </video>
  </div>

  <div class="video-wrapper">
    <video playsinline controls preload="auto">
      <source src="EAG2.mp4" type="video/mp4">
    </video>
  </div>

  <button class="arrow right" onclick="nextVideo()">❯</button>

</div>

<script>
let current = 0;
const wrappers = document.querySelectorAll(".video-wrapper");

function showVideo(index){
  wrappers[current].classList.remove("active");
  const vid = wrappers[current].querySelector("video");
  vid.pause();
  vid.currentTime = 0;

  current = index;
  if(current >= wrappers.length) current = 0;
  if(current < 0) current = wrappers.length - 1;

  wrappers[current].classList.add("active");
}

function nextVideo(){ showVideo(current + 1); }
function prevVideo(){ showVideo(current - 1); }

/* Auto-advance */
wrappers.forEach((wrapper,i)=>{
  const vid = wrapper.querySelector("video");
  vid.addEventListener("ended", ()=>{
    if(i === current) nextVideo();
  });
});
</script>
</body>
</html>
