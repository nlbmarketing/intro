<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nathan Branagh</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: black;
  transition: background 0.5s ease;
}

/* Blurred background */
.background-blur {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('NAH.png') center/cover no-repeat;
  filter: blur(25px);
  z-index: -1;
  transition: opacity 0.5s ease;
  opacity: 1;
}

/* Top links */
.links {
  margin: 1rem 0 0.5rem 0;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  z-index: 5;
  position: relative;
}

.links a {
  text-decoration: none;
  color: #00ffff;
  font-weight: bold;
  font-size: 1rem;
}

.links span {
  color: white;
  font-size: 1rem;
}

/* Carousel container */
.carousel-container {
  width: 100%;
  display: flex;
  justify-content: center;
  overflow: hidden;
  padding-bottom: 20px;
  position: relative;
}

/* Carousel row */
.carousel {
  display: flex;
  align-items: center;
  gap: 25px;
  transition: all 0.5s ease;
  scroll-behavior: smooth;
}

.carousel video {
  flex: 0 0 auto;
  width: 280px;       /* larger default */
  max-height: 65vh;
  border: 4px solid white; /* only in initial view */
  border-radius: 8px;
  object-fit: contain;
  background-color: transparent;
  transition: all 0.5s ease;
  cursor: pointer;
}

/* Focused state: remove border */
.carousel.focused video {
  opacity: 0.6;
  border: none;
}

.carousel.focused video.active {
  width: 480px;
  max-height: 85vh;
  opacity: 1;
  z-index: 2;
}

/* Arrows */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  font-size: 36px;
  padding: 12px 16px;
  cursor: pointer;
  border-radius: 6px;
  z-index: 10;
  display: none;
}

.carousel.focused + .arrow.left,
.carousel.focused + .arrow.right,
.carousel-container .arrow.left,
.carousel-container .arrow.right {
  display: block;
}

.arrow.left { left: 10px; }
.arrow.right { right: 10px; }

.arrow:hover {
  background: rgba(0,0,0,0.7);
}

/* Mobile responsiveness */
@media(max-width:900px){
  .carousel video {
    width: 160px;
    max-height: 55vh;
  }

  .carousel.focused video.active {
    width: auto;
    max-height: 90vh;
  }
}
</style>
</head>
<body>

<div class="background-blur"></div>

<!-- Top links -->
<div class="links">
  <a href="https://www.linkedin.com/in/nathanbranagh/" target="_blank">LinkedIn</a><span>|</span>
  <a href="https://drive.google.com/drive/folders/1x9_RzVzoP2SZ3xy2s5E-kBiOas8eTh6h" target="_blank">Portfolio</a><span>|</span>
  <a href="https://www.tiktok.com/@retrojthompson?_r=1&_t=ZN-935tpweVK10" target="_blank">TikTok</a>
</div>

<!-- Carousel -->
<div class="carousel-container">
  <div class="carousel">
    <video playsinline controls preload="auto">
      <source src="intro.mp4" type="video/mp4">
    </video>
    <video playsinline controls preload="auto">
      <source src="Cabinet.mp4" type="video/mp4">
    </video>
    <video playsinline controls preload="auto">
      <source src="Admiral.mp4" type="video/mp4">
    </video>
    <video playsinline controls preload="auto">
      <source src="EAG2.mp4" type="video/mp4">
    </video>
  </div>

  <button class="arrow left" onclick="prevVideo()">❮</button>
  <button class="arrow right" onclick="nextVideo()">❯</button>
</div>

<script>
let current = 0;
const carousel = document.querySelector(".carousel");
const videos = carousel.querySelectorAll("video");
const bgBlur = document.querySelector(".background-blur");

// Only one video plays at a time
videos.forEach(v => {
  v.addEventListener("play", () => {
    videos.forEach(other => { if(other !== v) other.pause(); });
  });
});

// Click video to focus
videos.forEach((vid,i)=>{
  vid.addEventListener("click", ()=>{
    if(!carousel.classList.contains("focused")){
      carousel.classList.add("focused");
      current = i;
      updateCarousel();
      bgBlur.style.opacity = 0;           // hide blur
      document.body.style.background = "black"; // black background in focused mode
    }
  });
});

// Click outside active video to exit focused mode
carousel.addEventListener("click", (e)=>{
  if(carousel.classList.contains("focused") && !e.target.classList.contains("active")){
    carousel.classList.remove("focused");
    videos.forEach(v => v.classList.remove("active"));
    bgBlur.style.opacity = 1;           // restore blurred background
    document.body.style.background = "black"; // fallback black
  }
});

function updateCarousel(){
  videos.forEach((v,i)=>{
    v.classList.remove("active");
    if(i===current) v.classList.add("active");
  });

  // Center active video
  const activeVideo = videos[current];
  const carouselRect = carousel.getBoundingClientRect();
  const videoRect = activeVideo.getBoundingClientRect();
  const offset = videoRect.left - carouselRect.left - (carouselRect.width/2) + (videoRect.width/2);
  carousel.scrollBy({ left: offset, behavior: 'smooth' });
}

function nextVideo(){
  current = (current + 1) % videos.length;
  updateCarousel();
}

function prevVideo(){
  current = (current -1 + videos.length) % videos.length;
  updateCarousel();
}
</script>
</body>
</html>
